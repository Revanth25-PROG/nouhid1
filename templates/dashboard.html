<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='atten.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:30px;
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:30px;
        }

        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:30px;
        }

        .card{
            width:220px;
            background:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card h2{
            color:#4f46e5;
            margin-bottom:10px;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
        }

        .chart-box{
            width:80%;
            max-width:800px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>📊 Attendance Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>Present</h2>
            <p>{{ present }}</p>
        </div>

        <div class="card">
            <h2>Absent</h2>
            <p>{{ absent }}</p>
        </div>

        <div class="card">
            <h2>Total</h2>
            <p>{{ total }}</p>
        </div>

    </div>

    <div class="chart-box">
        <canvas id="attendanceChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('attendanceChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Present', 'Absent', 'Total'],
                datasets: [{
                    label: 'Students',
                    data: [{{ present }}, {{ absent }}, {{ total }}],
                    backgroundColor: [
                        '#22c55e',
                        '#ef4444',
                        '#3b82f6'
                    ]
                }]
            },
            options: {
                responsive:true,
                plugins:{
                    legend:{
                        display:false
                    }
                },
                scales:{
                    y:{
                        beginAtZero:true
                    }
                }
            }
        });
    </script>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

    <h2>Admin Panel</h2>
    
    <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>

    <a href="{{ url_for('present_students') }}">✅ Present Students</a>

    <a href="{{ url_for('logout') }}">🚪 Logout</a>

</div>

<!-- JavaScript -->
<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
